kind = "web"
previewPath = "/"
title = "TN Bus+"
version = "1.0.0"
id = "artifacts/tnbus-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24745

[services.development]
run = "pnpm --filter @workspace/tnbus-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tnbus-web", "run", "build" ]
publicDir = "artifacts/tnbus-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24745"
BASE_PATH = "/"
