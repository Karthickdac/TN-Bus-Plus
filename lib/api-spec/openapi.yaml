openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TN Bus+ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: routes
    description: Bus route operations
  - name: buses
    description: Bus operations
  - name: bookings
    description: Booking operations
  - name: passengers
    description: Passenger operations
  - name: passes
    description: Travel passes and pass products
  - name: tracking
    description: Live GPS tracking
  - name: dashboard
    description: Dashboard aggregates
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Routes
  /routes:
    get:
      operationId: listRoutes
      tags: [routes]
      summary: List all routes
      parameters:
        - name: origin
          in: query
          schema:
            type: string
        - name: destination
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: busType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"

  /routes/{id}:
    get:
      operationId: getRoute
      tags: [routes]
      summary: Get route by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Route details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
        "404":
          description: Not found

  # Buses
  /buses:
    get:
      operationId: listBuses
      tags: [buses]
      summary: List all buses
      responses:
        "200":
          description: List of buses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bus"

  /buses/{id}:
    get:
      operationId: getBus
      tags: [buses]
      summary: Get bus by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bus details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bus"
        "404":
          description: Not found

  # Search
  /search:
    get:
      operationId: searchBuses
      tags: [routes]
      summary: Search for buses between origin and destination
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: true
          schema:
            type: string
        - name: busType
          in: query
          schema:
            type: string
        - name: ac
          in: query
          schema:
            type: boolean
        - name: sleeper
          in: query
          schema:
            type: boolean
        - name: chargingPort
          in: query
          schema:
            type: boolean
        - name: liveGps
          in: query
          schema:
            type: boolean
        - name: toilet
          in: query
          schema:
            type: boolean
        - name: womenFriendly
          in: query
          schema:
            type: boolean
        - name: lowCrowd
          in: query
          schema:
            type: boolean
        - name: nightBus
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"

  # Fare calendar
  /search/fare-calendar:
    get:
      operationId: getFareCalendar
      tags: [routes]
      summary: Fare across a range of dates for a route
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Fare per date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FareCalendarDay"

  # Seats
  /schedules/{scheduleId}/seats:
    get:
      operationId: getSeats
      tags: [buses]
      summary: Get seat layout for a schedule
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seat layout
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Seat"

  # Bookings
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings for a passenger
      parameters:
        - name: passengerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found

  /bookings/{id}/cancel:
    post:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /pnr/{pnr}:
    get:
      operationId: getPnrStatus
      tags: [bookings]
      summary: Get PNR status
      parameters:
        - name: pnr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNR status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found

  # Payments (Razorpay)
  /bookings/checkout-order:
    post:
      operationId: createBookingOrder
      tags: [payments]
      summary: Create a pending booking and a Razorpay order for its fare
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Payment order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          description: Invalid input

  /passengers/{id}/wallet/topup-order:
    post:
      operationId: createWalletTopUpOrder
      tags: [payments]
      summary: Create a Razorpay order to top up the wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletTopUpInput"
      responses:
        "201":
          description: Payment order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          description: Invalid input

  /payments/verify:
    post:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify a completed Razorpay payment and apply it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentVerifyInput"
      responses:
        "200":
          description: Payment verified and applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerifyResult"
        "400":
          description: Verification failed

  # Passengers
  /passengers:
    post:
      operationId: createPassenger
      tags: [passengers]
      summary: Register a new passenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerInput"
      responses:
        "201":
          description: Passenger created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}:
    get:
      operationId: getPassenger
      tags: [passengers]
      summary: Get passenger profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Passenger profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"
        "404":
          description: Not found
    patch:
      operationId: updatePassenger
      tags: [passengers]
      summary: Update passenger profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerUpdate"
      responses:
        "200":
          description: Passenger updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  # Wallet
  /passengers/{id}/wallet:
    get:
      operationId: getWallet
      tags: [passengers]
      summary: Get wallet balance and transactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wallet details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /passengers/{id}/wallet/topup:
    post:
      operationId: topUpWallet
      tags: [passengers]
      summary: Add money to the wallet (simulated payment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletTopUpInput"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /passengers/{id}/rewards/redeem:
    post:
      operationId: redeemRewardPoints
      tags: [passengers]
      summary: Redeem reward points for wallet credit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewardRedeemInput"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  # Passes
  /pass-products:
    get:
      operationId: listPassProducts
      tags: [passes]
      summary: List available pass products with subsidy details
      responses:
        "200":
          description: Pass products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PassProduct"

  /passengers/{id}/passes:
    get:
      operationId: listPasses
      tags: [passes]
      summary: List a passenger's purchased passes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchased passes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pass"
    post:
      operationId: purchasePass
      tags: [passes]
      summary: Purchase a pass (paid from wallet, simulated)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassPurchaseInput"
      responses:
        "201":
          description: Pass purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pass"

  # Tracking
  /tracking/{busId}:
    get:
      operationId: getBusLocation
      tags: [tracking]
      summary: Get live bus location with route geometry and safety alerts
      parameters:
        - name: busId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bus tracking detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusTracking"
        "404":
          description: Not found

  # Dashboard (wow endpoints)
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get passenger dashboard summary stats
      parameters:
        - name: passengerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/popular-routes:
    get:
      operationId: getPopularRoutes
      tags: [dashboard]
      summary: Get popular routes
      responses:
        "200":
          description: Popular routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopularRoute"

  /dashboard/upcoming-trips:
    get:
      operationId: getUpcomingTrips
      tags: [dashboard]
      summary: Get upcoming trips for a passenger
      parameters:
        - name: passengerId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Upcoming trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  # Admin
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin overview stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/buses:
    get:
      operationId: adminListBuses
      tags: [admin]
      summary: Admin bus fleet list with status
      responses:
        "200":
          description: Fleet list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bus"

  /admin/bookings:
    get:
      operationId: adminListBookings
      tags: [admin]
      summary: Admin list all bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /admin/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [admin]
      summary: Get revenue analytics by date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Revenue analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueAnalytics"

  /admin/complaints:
    get:
      operationId: listComplaints
      tags: [admin]
      summary: List all complaints
      responses:
        "200":
          description: Complaints list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
    post:
      operationId: createComplaint
      tags: [admin]
      summary: Submit a complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintInput"
      responses:
        "201":
          description: Complaint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"

  /admin/bus-locations:
    get:
      operationId: getFleetLocations
      tags: [admin]
      summary: Live locations and alerts for the active fleet
      responses:
        "200":
          description: Fleet overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetOverview"

  /admin/routes:
    get:
      operationId: listAdminRoutes
      tags: [admin]
      summary: List all routes (admin)
      responses:
        "200":
          description: Routes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"
    post:
      operationId: createRoute
      tags: [admin]
      summary: Create a route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteInput"
      responses:
        "201":
          description: Route created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
        "400":
          description: Invalid input

  /admin/routes/{id}:
    patch:
      operationId: updateRoute
      tags: [admin]
      summary: Update a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteInput"
      responses:
        "200":
          description: Route updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
        "400":
          description: Invalid input
        "404":
          description: Not found
    delete:
      operationId: deleteRoute
      tags: [admin]
      summary: Delete a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Route deleted
        "404":
          description: Not found

  /assistant/chat:
    post:
      operationId: assistantChat
      tags: [assistant]
      summary: Conversational AI travel assistant (Tamil + English)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantChatInput"
      responses:
        "200":
          description: Assistant reply with matching trips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantChatResult"

  # Saved / favorite routes
  /passengers/{id}/saved-routes:
    get:
      operationId: listSavedRoutes
      tags: [passengers]
      summary: List a passenger's saved routes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedRoute"

  /saved-routes:
    post:
      operationId: createSavedRoute
      tags: [passengers]
      summary: Save a favorite route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRouteInput"
      responses:
        "201":
          description: Saved route created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"

  /saved-routes/{id}:
    delete:
      operationId: deleteSavedRoute
      tags: [passengers]
      summary: Remove a saved route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Saved route removed

  # Notifications
  /passengers/{id}/notifications:
    get:
      operationId: listNotifications
      tags: [passengers]
      summary: List a passenger's notifications (seeds festival/special alerts)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /passengers/{id}/notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [passengers]
      summary: Mark all of a passenger's notifications as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [passengers]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  # Refunds
  /passengers/{id}/refunds:
    get:
      operationId: listRefunds
      tags: [passengers]
      summary: List a passenger's refund requests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refunds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Refund"

  # Smart rebooking suggestions for a cancelled booking
  /bookings/{id}/rebooking-suggestions:
    get:
      operationId: getRebookingSuggestions
      tags: [bookings]
      summary: Get smart rebooking suggestions for the same route as a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rebooking suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RebookingSuggestion"

  # Passenger booking preferences (seat / bus type memory)
  /passengers/{id}/preferences:
    get:
      operationId: getPreferences
      tags: [passengers]
      summary: Get a passenger's booking preferences
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    put:
      operationId: updatePreferences
      tags: [passengers]
      summary: Update a passenger's booking preferences
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferencesInput"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Route:
      type: object
      properties:
        id:
          type: integer
        origin:
          type: string
        destination:
          type: string
        distanceKm:
          type: number
        durationMinutes:
          type: integer
        basefare:
          type: number
        stops:
          type: array
          items:
            type: string
      required:
        - id
        - origin
        - destination
        - distanceKm
        - durationMinutes
        - basefare

    Bus:
      type: object
      properties:
        id:
          type: integer
        busNumber:
          type: string
        busType:
          type: string
        totalSeats:
          type: integer
        amenities:
          type: array
          items:
            type: string
        status:
          type: string
        currentLocation:
          type: ["string", "null"]
        punctualityScore:
          type: number
        driverName:
          type: ["string", "null"]
