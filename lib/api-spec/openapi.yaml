openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TN Bus+ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: routes
    description: Bus route operations
  - name: buses
    description: Bus operations
  - name: bookings
    description: Booking operations
  - name: passengers
    description: Passenger operations
  - name: passes
    description: Travel passes and pass products
  - name: tracking
    description: Live GPS tracking
  - name: dashboard
    description: Dashboard aggregates
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Routes
  /routes:
    get:
      operationId: listRoutes
      tags: [routes]
      summary: List all routes
      parameters:
        - name: origin
          in: query
          schema:
            type: string
        - name: destination
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: busType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"

  /routes/{id}:
    get:
      operationId: getRoute
      tags: [routes]
      summary: Get route by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Route details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
        "404":
          description: Not found

  # Buses
  /buses:
    get:
      operationId: listBuses
      tags: [buses]
      summary: List all buses
      responses:
        "200":
          description: List of buses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bus"

  /buses/{id}:
    get:
      operationId: getBus
      tags: [buses]
      summary: Get bus by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bus details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bus"
        "404":
          description: Not found

  # Search
  /search:
    get:
      operationId: searchBuses
      tags: [routes]
      summary: Search for buses between origin and destination
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: true
          schema:
            type: string
        - name: busType
          in: query
          schema:
            type: string
        - name: ac
          in: query
          schema:
            type: boolean
        - name: sleeper
          in: query
          schema:
            type: boolean
        - name: chargingPort
          in: query
          schema:
            type: boolean
        - name: liveGps
          in: query
          schema:
            type: boolean
        - name: toilet
          in: query
          schema:
            type: boolean
        - name: womenFriendly
          in: query
          schema:
            type: boolean
        - name: lowCrowd
          in: query
          schema:
            type: boolean
        - name: nightBus
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"

  # Fare calendar
  /search/fare-calendar:
    get:
      operationId: getFareCalendar
      tags: [routes]
      summary: Fare across a range of dates for a route
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Fare per date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FareCalendarDay"

  # Seats
  /schedules/{scheduleId}/seats:
    get:
      operationId: getSeats
      tags: [buses]
      summary: Get seat layout for a schedule
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seat layout
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Seat"

  # Bookings
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings for a passenger
      parameters:
        - name: passengerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found

  /bookings/{id}/cancel:
    post:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /pnr/{pnr}:
    get:
      operationId: getPnrStatus
      tags: [bookings]
      summary: Get PNR status
      parameters:
        - name: pnr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNR status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found

  # Payments (Razorpay)
  /bookings/checkout-order:
    post:
      operationId: createBookingOrder
      tags: [payments]
      summary: Create a pending booking and a Razorpay order for its fare
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Payment order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          description: Invalid input

  /passengers/{id}/wallet/topup-order:
    post:
      operationId: createWalletTopUpOrder
      tags: [payments]
      summary: Create a Razorpay order to top up the wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletTopUpInput"
      responses:
        "201":
          description: Payment order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          description: Invalid input

  /payments/verify:
    post:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify a completed Razorpay payment and apply it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentVerifyInput"
      responses:
        "200":
          description: Payment verified and applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerifyResult"
        "400":
          description: Verification failed

  # Passengers
  /passengers:
    post:
      operationId: createPassenger
      tags: [passengers]
      summary: Register a new passenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerInput"
      responses:
        "201":
          description: Passenger created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}:
    get:
      operationId: getPassenger
      tags: [passengers]
      summary: Get passenger profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Passenger profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"
        "404":
          description: Not found
    patch:
      operationId: updatePassenger
      tags: [passengers]
      summary: Update passenger profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerUpdate"
      responses:
        "200":
          description: Passenger updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  # Wallet
  /passengers/{id}/wallet:
    get:
      operationId: getWallet
      tags: [passengers]
      summary: Get wallet balance and transactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wallet details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /passengers/{id}/wallet/topup:
    post:
      operationId: topUpWallet
      tags: [passengers]
      summary: Add money to the wallet (simulated payment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletTopUpInput"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /passengers/{id}/rewards/redeem:
    post:
      operationId: redeemRewardPoints
      tags: [passengers]
      summary: Redeem reward points for wallet credit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewardRedeemInput"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  # Passes
  /pass-products:
    get:
      operationId: listPassProducts
      tags: [passes]
      summary: List available pass products with subsidy details
      responses:
        "200":
          description: Pass products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PassProduct"

  /passengers/{id}/passes:
    get:
      operationId: listPasses
      tags: [passes]
      summary: List a passenger's purchased passes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchased passes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pass"
    post:
      operationId: purchasePass
      tags: [passes]
      summary: Purchase a pass (paid from wallet, simulated)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassPurchaseInput"
      responses:
        "201":
          description: Pass purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pass"

  # Tracking
  /tracking/{busId}:
    get:
      operationId: getBusLocation
      tags: [tracking]
      summary: Get live bus location with route geometry and safety alerts
      parameters:
        - name: busId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bus tracking detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusTracking"
        "404":
          description: Not found

  # Dashboard (wow endpoints)
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get passenger dashboard summary stats
      parameters:
        - name: passengerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/popular-routes:
    get:
      operationId: getPopularRoutes
      tags: [dashboard]
      summary: Get popular routes
      responses:
        "200":
          description: Popular routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopularRoute"

  /dashboard/upcoming-trips:
    get:
      operationId: getUpcomingTrips
      tags: [dashboard]
      summary: Get upcoming trips for a passenger
      parameters:
        - name: passengerId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Upcoming trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  # Admin
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin overview stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/buses:
    get:
      operationId: adminListBuses
      tags: [admin]
      summary: Admin bus fleet list with status
      responses:
        "200":
          description: Fleet list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bus"

  /admin/bookings:
    get:
      operationId: adminListBookings
      tags: [admin]
      summary: Admin list all bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /admin/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [admin]
      summary: Get revenue analytics by date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Revenue analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueAnalytics"

  /admin/complaints:
    get:
      operationId: listComplaints
      tags: [admin]
      summary: List all complaints
      responses:
        "200":
          description: Complaints list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
    post:
      operationId: createComplaint
      tags: [admin]
      summary: Submit a complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintInput"
      responses:
        "201":
          description: Complaint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"

  /admin/bus-locations:
    get:
      operationId: getFleetLocations
      tags: [admin]
      summary: Live locations and alerts for the active fleet
      responses:
        "200":
          description: Fleet overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetOverview"

  /admin/routes:
    get:
      operationId: listAdminRoutes
      tags: [admin]
      summary: List all routes (admin)
      responses:
        "200":
          description: Routes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"
    post:
      operationId: createRoute
      tags: [admin]
      summary: Create a route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteInput"
      responses:
        "201":
          description: Route created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
        "400":
          description: Invalid input

  /admin/routes/{id}:
    patch:
      operationId: updateRoute
      tags: [admin]
      summary: Update a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteInput"
      responses:
        "200":
          description: Route updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
        "400":
          description: Invalid input
        "404":
          description: Not found
    delete:
      operationId: deleteRoute
      tags: [admin]
      summary: Delete a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Route deleted
        "404":
          description: Not found

  /admin/complaints/analyze-pending:
    post:
      operationId: analyzePendingComplaints
      tags: [admin]
      summary: Run AI analysis on complaints not yet analyzed
      responses:
        "200":
          description: Count of complaints analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzePendingResult"

  /admin/complaint-intel:
    get:
      operationId: getComplaintIntel
      tags: [admin]
      summary: Depot-wise complaint heatmap, trends and sentiment breakdown
      responses:
        "200":
          description: Complaint intelligence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintIntel"

  /admin/ai-insights:
    get:
      operationId: getAiInsights
      tags: [admin]
      summary: Plain-language AI operational insights
      responses:
        "200":
          description: AI insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiInsights"

  /admin/passenger-demand:
    get:
      operationId: getPassengerDemand
      tags: [admin]
      summary: Passenger demand heatmaps by origin, destination, route and time
      responses:
        "200":
          description: Passenger demand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassengerDemand"

  /admin/ops-analytics:
    get:
      operationId: getOpsAnalytics
      tags: [admin]
      summary: Predictive maintenance, driver behaviour and fuel analytics
      responses:
        "200":
          description: Operations analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsAnalytics"

  /admin/depots:
    get:
      operationId: listDepots
      tags: [admin]
      summary: List all depots
      responses:
        "200":
          description: Depots list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Depot"
    post:
      operationId: createDepot
      tags: [admin]
      summary: Create a depot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepotInput"
      responses:
        "201":
          description: Depot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Depot"
        "400":
          description: Invalid input

  /admin/depots/{id}:
    patch:
      operationId: updateDepot
      tags: [admin]
      summary: Update a depot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepotInput"
      responses:
        "200":
          description: Depot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Depot"
        "400":
          description: Invalid input
        "404":
          description: Not found
    delete:
      operationId: deleteDepot
      tags: [admin]
      summary: Delete a depot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Depot deleted
        "404":
          description: Not found
        "409":
          description: Depot in use

  /admin/crew:
    get:
      operationId: listCrew
      tags: [admin]
      summary: List all crew members
      responses:
        "200":
          description: Crew list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Crew"
    post:
      operationId: createCrew
      tags: [admin]
      summary: Create a crew member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrewInput"
      responses:
        "201":
          description: Crew created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crew"
        "400":
          description: Invalid input

  /admin/crew/{id}:
    patch:
      operationId: updateCrew
      tags: [admin]
      summary: Update a crew member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrewInput"
      responses:
        "200":
          description: Crew updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crew"
        "400":
          description: Invalid input
        "404":
          description: Not found
    delete:
      operationId: deleteCrew
      tags: [admin]
      summary: Delete a crew member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Crew deleted
        "404":
          description: Not found

  /assistant/chat:
    post:
      operationId: assistantChat
      tags: [assistant]
      summary: Conversational AI travel assistant (Tamil + English)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantChatInput"
      responses:
        "200":
          description: Assistant reply with matching trips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantChatResult"

  # Saved / favorite routes
  /passengers/{id}/saved-routes:
    get:
      operationId: listSavedRoutes
      tags: [passengers]
      summary: List a passenger's saved routes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedRoute"

  /saved-routes:
    post:
      operationId: createSavedRoute
      tags: [passengers]
      summary: Save a favorite route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRouteInput"
      responses:
        "201":
          description: Saved route created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"

  /saved-routes/{id}:
    delete:
      operationId: deleteSavedRoute
      tags: [passengers]
      summary: Remove a saved route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Saved route removed

  # Notifications
  /passengers/{id}/notifications:
    get:
      operationId: listNotifications
      tags: [passengers]
      summary: List a passenger's notifications (seeds festival/special alerts)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /passengers/{id}/notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [passengers]
      summary: Mark all of a passenger's notifications as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [passengers]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  # Refunds
  /passengers/{id}/refunds:
    get:
      operationId: listRefunds
      tags: [passengers]
      summary: List a passenger's refund requests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refunds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Refund"

  # Smart rebooking suggestions for a cancelled booking
  /bookings/{id}/rebooking-suggestions:
    get:
      operationId: getRebookingSuggestions
      tags: [bookings]
      summary: Get smart rebooking suggestions for the same route as a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rebooking suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RebookingSuggestion"

  # Passenger booking preferences (seat / bus type memory)
  /passengers/{id}/preferences:
    get:
      operationId: getPreferences
      tags: [passengers]
      summary: Get a passenger's booking preferences
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    put:
      operationId: updatePreferences
      tags: [passengers]
      summary: Update a passenger's booking preferences
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferencesInput"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

  /staff/profile:
    get:
      operationId: getStaffProfile
      tags: [staff]
      summary: Signed-in staff member's role, crew profile and assigned bus
      responses:
        "200":
          description: Staff profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffProfile"
        "401":
          description: Not authenticated
        "403":
          description: Not a staff account

  /conductor/validate:
    post:
      operationId: validateTicket
      tags: [staff]
      summary: Validate a scanned ticket QR/PNR against real bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateTicketInput"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"
        "400":
          description: Invalid input

  /conductor/manifest:
    get:
      operationId: getManifest
      tags: [staff]
      summary: Passenger manifest for the conductor's assigned bus
      parameters:
        - name: scheduleId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Manifest entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManifestEntry"

  /conductor/occupancy:
    get:
      operationId: listOccupancyReports
      tags: [staff]
      summary: Recent live occupancy reports for the assigned bus
      responses:
        "200":
          description: Occupancy reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OccupancyReport"
    post:
      operationId: createOccupancyReport
      tags: [staff]
      summary: Report current live occupancy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OccupancyReportInput"
      responses:
        "201":
          description: Occupancy recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OccupancyReport"
        "400":
          description: Invalid input

  /conductor/cash:
    get:
      operationId: listCashCollections
      tags: [staff]
      summary: Cash collection records for the assigned bus
      responses:
        "200":
          description: Cash collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashCollection"
    post:
      operationId: createCashCollection
      tags: [staff]
      summary: Sync a cash collection record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashCollectionInput"
      responses:
        "201":
          description: Cash collection recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashCollection"
        "400":
          description: Invalid input

  /driver/duty:
    get:
      operationId: getDriverDuty
      tags: [staff]
      summary: Upcoming duty schedule for the driver's assigned bus
      responses:
        "200":
          description: Duty entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DutyEntry"

  /driver/fuel:
    get:
      operationId: listFuelLogs
      tags: [staff]
      summary: Fuel logs for the assigned bus
      responses:
        "200":
          description: Fuel logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FuelLog"
    post:
      operationId: createFuelLog
      tags: [staff]
      summary: Log a refuelling event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FuelLogInput"
      responses:
        "201":
          description: Fuel log recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FuelLog"
        "400":
          description: Invalid input

  /driver/inspection:
    get:
      operationId: listInspections
      tags: [staff]
      summary: Vehicle inspection records for the assigned bus
      responses:
        "200":
          description: Inspections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inspection"
    post:
      operationId: createInspection
      tags: [staff]
      summary: Submit a vehicle inspection checklist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InspectionInput"
      responses:
        "201":
          description: Inspection recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"
        "400":
          description: Invalid input

  /driver/emergency:
    get:
      operationId: listEmergencyReports
      tags: [staff]
      summary: Emergency reports filed for the assigned bus
      responses:
        "200":
          description: Emergency reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmergencyReport"
    post:
      operationId: createEmergencyReport
      tags: [staff]
      summary: File an emergency report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmergencyReportInput"
      responses:
        "201":
          description: Emergency report filed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyReport"
        "400":
          description: Invalid input

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Route:
      type: object
      properties:
        id:
          type: integer
        origin:
          type: string
        destination:
          type: string
        distanceKm:
          type: number
        durationMinutes:
          type: integer
        basefare:
          type: number
        stops:
          type: array
          items:
            type: string
      required:
        - id
        - origin
        - destination
        - distanceKm
        - durationMinutes
        - basefare

    Bus:
      type: object
      properties:
        id:
          type: integer
        busNumber:
          type: string
        busType:
          type: string
        totalSeats:
          type: integer
        amenities:
          type: array
          items:
            type: string
        status:
          type: string
        currentLocation:
          type: ["string", "null"]
        punctualityScore:
          type: number
        driverName:
          type: ["string", "null"]
        routeId:
          type: ["integer", "null"]
      required:
        - id
        - busNumber
        - busType
        - totalSeats
        - status

    SearchResult:
      type: object
      properties:
        scheduleId:
          type: integer
        busId:
          type: integer
        busNumber:
          type: string
        busType:
          type: string
        origin:
          type: string
        destination:
          type: string
        departureTime:
          type: string
        arrivalTime:
          type: string
        fare:
          type: number
        availableSeats:
          type: integer
        totalSeats:
          type: integer
        amenities:
          type: array
          items:
            type: string
        punctualityScore:
          type: number
        crowdDensity:
          type: string
        estimatedDelay:
          type: integer
        comfortScore:
          type: number
        safetyRating:
          type: number
        driverRating:
          type: number
        driverName:
          type: ["string", "null"]
        fareTrend:
          type: string
        isNightBus:
          type: boolean
        nearbyBoardingPoints:
          type: array
          items:
            type: string
      required:
        - scheduleId
        - busId
        - busNumber
        - busType
        - origin
        - destination
        - departureTime
        - arrivalTime
        - fare
        - availableSeats
        - totalSeats

    AssistantChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    AssistantIntent:
      type: object
      properties:
        origin:
          type: string
        destination:
          type: string
        ac:
          type: boolean
        sleeper:
          type: boolean
        chargingPort:
          type: boolean
        liveGps:
          type: boolean
        toilet:
          type: boolean
        womenFriendly:
          type: boolean
        lowCrowd:
          type: boolean
        nightBus:
          type: boolean
        sort:
          type: string

    AssistantChatInput:
      type: object
      properties:
        message:
          type: string
        lang:
          type: string
          enum: [en, ta]
        history:
          type: array
          items:
            $ref: "#/components/schemas/AssistantChatMessage"
      required:
        - message

    AssistantChatResult:
      type: object
      properties:
        reply:
          type: string
        trips:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        intent:
          $ref: "#/components/schemas/AssistantIntent"
      required:
        - reply
        - trips

    FareCalendarDay:
      type: object
      properties:
        date:
          type: string
        fare:
          type: number
        isCheapest:
          type: boolean
        available:
          type: boolean
      required:
        - date
        - fare
        - isCheapest
        - available

    Seat:
      type: object
      properties:
        seatNumber:
          type: string
        row:
          type: integer
        column:
          type: integer
        type:
          type: string
        isAvailable:
          type: boolean
        isWomenOnly:
          type: boolean
        price:
          type: number
      required:
        - seatNumber
        - row
        - column
        - type
        - isAvailable
        - isWomenOnly
        - price

    Booking:
      type: object
      properties:
        id:
          type: integer
        pnr:
          type: string
        passengerId:
          type: integer
        scheduleId:
          type: integer
        busNumber:
          type: string
        origin:
          type: string
        destination:
          type: string
        departureTime:
          type: string
        arrivalTime:
          type: string
        seatNumbers:
          type: array
          items:
            type: string
        totalFare:
          type: number
        status:
          type: string
        paymentStatus:
          type: string
        passengerName:
          type: string
        passengerPhone:
          type: string
        createdAt:
          type: string
        qrCode:
          type: ["string", "null"]
        rewardPointsEarned:
          type: integer
          description: Reward points credited for this booking, derived from the trusted schedule fare. Present on the create-booking response and on booking detail.
      required:
        - id
        - pnr
        - passengerId
        - scheduleId
        - origin
        - destination
        - departureTime
        - arrivalTime
        - seatNumbers
        - totalFare
        - status
        - paymentStatus
        - passengerName
        - passengerPhone
        - createdAt

    BookingInput:
      type: object
      properties:
        passengerId:
          type: integer
        scheduleId:
          type: integer
        seatNumbers:
          type: array
          items:
            type: string
        passengerName:
          type: string
        passengerPhone:
          type: string
        totalFare:
          type: number
        paymentMethod:
          type: string
          description: How the fare is paid. When "wallet", the trusted server-side fare is debited from the passenger's wallet balance (this is how redeemed reward points are spent against fares). Any other value is treated as a simulated external payment.
      required:
        - passengerId
        - scheduleId
        - seatNumbers
        - passengerName
        - passengerPhone
        - totalFare

    Passenger:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        walletBalance:
          type: number
        rewardPoints:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - phone
        - walletBalance
        - rewardPoints
        - createdAt

    PassengerInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - phone
        - password

    PassengerUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string

    Wallet:
      type: object
      properties:
        balance:
          type: number
        rewardPoints:
          type: integer
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"
      required:
        - balance
        - rewardPoints
        - transactions

    WalletTransaction:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string
      required:
        - id
        - amount
        - type
        - description
        - createdAt

    WalletTopUpInput:
      type: object
      properties:
        amount:
          type: number
        method:
          type: string
      required:
        - amount

    PaymentOrder:
      type: object
      properties:
        orderId:
          type: string
        amount:
          type: number
          description: Amount in rupees.
        currency:
          type: string
        keyId:
          type: string
          description: Public Razorpay key id for Checkout.
        kind:
          type: string
          description: booking or wallet_topup.
        bookingId:
          type: ["integer", "null"]
          description: The pending booking this order pays for, when kind is booking.
        name:
          type: string
        description:
          type: string
      required:
        - orderId
        - amount
        - currency
        - keyId
        - kind

    PaymentVerifyInput:
      type: object
      properties:
        razorpayOrderId:
          type: string
        razorpayPaymentId:
          type: string
        razorpaySignature:
          type: string
      required:
        - razorpayOrderId
        - razorpayPaymentId
        - razorpaySignature

    PaymentVerifyResult:
      type: object
      properties:
        status:
          type: string
          description: paid when the payment was verified and applied.
        kind:
          type: string
        bookingId:
          type: ["integer", "null"]
      required:
        - status
        - kind

    RewardRedeemInput:
      type: object
      properties:
        points:
          type: integer
      required:
        - points

    PassProduct:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        description:
          type: string
        durationDays:
          type: integer
        price:
          type: number
        subsidyAmount:
          type: number
        netPrice:
          type: number
        benefits:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - category
        - description
        - durationDays
        - price
        - subsidyAmount
        - netPrice
        - benefits

    Pass:
      type: object
      properties:
        id:
          type: integer
        passengerId:
          type: integer
        productId:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: number
        subsidyAmount:
          type: number
        amountPaid:
          type: number
        validFrom:
          type: string
        validUntil:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - passengerId
        - productId
        - name
        - category
        - price
        - subsidyAmount
        - amountPaid
        - validFrom
        - validUntil
        - status
        - createdAt

    PassPurchaseInput:
      type: object
      properties:
        productId:
          type: string
      required:
        - productId

    BusLocation:
      type: object
      properties:
        busId:
          type: integer
        busNumber:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        speed:
          type: number
        heading:
          type: number
        lastUpdated:
          type: string
        nextStop:
          type: string
        etaMinutes:
          type: integer
        status:
          type: string
      required:
        - busId
        - busNumber
        - latitude
        - longitude
        - speed
        - heading
        - lastUpdated
        - status

    TrackPoint:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
      required:
        - lat
        - lng

    TrackStop:
      type: object
      properties:
        name:
          type: string
        lat:
          type: number
        lng:
          type: number
        passed:
          type: boolean
      required:
        - name
        - lat
        - lng
        - passed

    RouteGeometry:
      type: object
      properties:
        origin:
          type: string
        destination:
          type: string
        polyline:
          type: array
          items:
            $ref: "#/components/schemas/TrackPoint"
        stops:
          type: array
          items:
            $ref: "#/components/schemas/TrackStop"
      required:
        - origin
        - destination
        - polyline
        - stops

    TrackAlert:
      type: object
      properties:
        type:
          type: string
          description: overspeed | deviation | geofence | breakdown | stale_signal
        severity:
          type: string
          description: info | warning | critical
        message:
          type: string
      required:
        - type
        - severity
        - message

    BusTracking:
      type: object
      properties:
        busId:
          type: integer
        busNumber:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        speed:
          type: number
        heading:
          type: number
        lastUpdated:
          type: string
        nextStop:
          type: ["string", "null"]
        etaMinutes:
          type: ["integer", "null"]
        etaToDestinationMinutes:
          type: ["integer", "null"]
        status:
          type: string
        route:
          oneOf:
            - $ref: "#/components/schemas/RouteGeometry"
            - type: "null"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/TrackAlert"
      required:
        - busId
        - busNumber
        - latitude
        - longitude
        - speed
        - heading
        - lastUpdated
        - status
        - alerts

    FleetBus:
      type: object
      properties:
        busId:
          type: integer
        busNumber:
          type: string
        busType:
          type: string
        driverName:
          type: ["string", "null"]
        latitude:
          type: number
        longitude:
          type: number
        speed:
          type: number
        heading:
          type: number
        status:
          type: string
        nextStop:
          type: ["string", "null"]
        etaMinutes:
          type: ["integer", "null"]
        lastUpdated:
          type: string
        online:
          type: boolean
        alertCount:
          type: integer
        topAlertSeverity:
          type: ["string", "null"]
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/TrackAlert"
      required:
        - busId
        - busNumber
        - busType
        - latitude
        - longitude
        - speed
        - heading
        - status
        - lastUpdated
        - online
        - alertCount
        - alerts

    FleetOverview:
      type: object
      properties:
        buses:
          type: array
          items:
            $ref: "#/components/schemas/FleetBus"
        summary:
          type: object
          properties:
            total:
              type: integer
            online:
              type: integer
            offline:
              type: integer
            alerts:
              type: integer
            breakdowns:
              type: integer
          required:
            - total
            - online
            - offline
            - alerts
            - breakdowns
      required:
        - buses
        - summary

    RouteInput:
      type: object
      properties:
        origin:
          type: string
        destination:
          type: string
        distanceKm:
          type: number
        durationMinutes:
          type: integer
        basefare:
          type: number
        stops:
          type: array
          items:
            type: string
      required:
        - origin
        - destination
        - distanceKm
        - durationMinutes
        - basefare

    DashboardStats:
      type: object
      properties:
        totalTrips:
          type: integer
        totalSpent:
          type: number
        walletBalance:
          type: number
        rewardPoints:
          type: integer
        upcomingTrips:
          type: integer
        savedRoutes:
          type: integer
      required:
        - totalTrips
        - totalSpent
        - walletBalance
        - rewardPoints
        - upcomingTrips
        - savedRoutes

    PopularRoute:
      type: object
      properties:
